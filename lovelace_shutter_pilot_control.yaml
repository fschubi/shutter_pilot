# Shutter Pilot Control Card
# Nur zum Bedienen – keine Konfiguration.
# In Dashboard einfügen: Bearbeiten → Karte hinzufügen → Manuelle Konfiguration → Inhalt einfügen.

views:
  - title: Rollladen
    path: rollladen
    icon: mdi:blinds
    type: panel
    cards:
      # ========== GRUPPEN-STEUERUNG ==========
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Gruppen"
          - type: horizontal-stack
            cards:
              - type: button
                name: Wohnbereich hoch
                icon: mdi:arrow-up
                tap_action:
                  action: call-service
                  service: shutter_pilot.open_group
                  service_data:
                    group: living
                hold_action:
                  action: none
              - type: button
                name: Wohnbereich runter
                icon: mdi:arrow-down
                tap_action:
                  action: call-service
                  service: shutter_pilot.close_group
                  service_data:
                    group: living
                hold_action:
                  action: none
              - type: button
                name: Sonnenschutz
                icon: mdi:white-balance-sunny
                tap_action:
                  action: call-service
                  service: shutter_pilot.sun_protect_group
                  service_data:
                    group: living
                hold_action:
                  action: none
          - type: horizontal-stack
            cards:
              - type: button
                name: Schlaf hoch
                icon: mdi:arrow-up
                tap_action:
                  action: call-service
                  service: shutter_pilot.open_group
                  service_data:
                    group: sleep
                hold_action:
                  action: none
              - type: button
                name: Schlaf runter
                icon: mdi:arrow-down
                tap_action:
                  action: call-service
                  service: shutter_pilot.close_group
                  service_data:
                    group: sleep
                hold_action:
                  action: none
              - type: button
                name: Sonnenschutz
                icon: mdi:white-balance-sunny
                tap_action:
                  action: call-service
                  service: shutter_pilot.sun_protect_group
                  service_data:
                    group: sleep
                hold_action:
                  action: none
          - type: horizontal-stack
            cards:
              - type: button
                name: Kinder hoch
                icon: mdi:arrow-up
                tap_action:
                  action: call-service
                  service: shutter_pilot.open_group
                  service_data:
                    group: children
                hold_action:
                  action: none
              - type: button
                name: Kinder runter
                icon: mdi:arrow-down
                tap_action:
                  action: call-service
                  service: shutter_pilot.close_group
                  service_data:
                    group: children
                hold_action:
                  action: none
              - type: button
                name: Sonnenschutz
                icon: mdi:white-balance-sunny
                tap_action:
                  action: call-service
                  service: shutter_pilot.sun_protect_group
                  service_data:
                    group: children
                hold_action:
                  action: none
          - type: horizontal-stack
            cards:
              - type: button
                name: Alle hoch
                icon: mdi:arrow-up-bold
                tap_action:
                  action: call-service
                  service: shutter_pilot.open_group
                  service_data:
                    group: all
                hold_action:
                  action: none
              - type: button
                name: Alle runter
                icon: mdi:arrow-down-bold
                tap_action:
                  action: call-service
                  service: shutter_pilot.close_group
                  service_data:
                    group: all
                hold_action:
                  action: none
              - type: button
                name: Alle Sonnenschutz
                icon: mdi:white-balance-sunny
                tap_action:
                  action: call-service
                  service: shutter_pilot.sun_protect_group
                  service_data:
                    group: all
                hold_action:
                  action: none

      # ========== EINZELNE ROLLLÄDEN ==========
      # Ersetze die Beispiel-Entities durch deine Cover-Entities aus Shutter Pilot
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Einzelne Rollläden"
          - type: entities
            title: ""
            entities:
              - entity: cover.wohnzimmer
                name: Wohnzimmer
                secondary_info: last-changed
              - entity: cover.schlafzimmer
                name: Schlafzimmer
                secondary_info: last-changed
              - entity: cover.kinderzimmer
                name: Kinderzimmer
                secondary_info: last-changed
